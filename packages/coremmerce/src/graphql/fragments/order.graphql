# Order fulfillment information
fragment OrderFulfillment on Order {
  id
  number
  fulfillments {
    id
    status
    trackingNumber
    created
    lines {
      id
      quantity
      orderLine {
        id
        productName
        variantName
      }
    }
  }
}
