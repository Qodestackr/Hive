fragment Money on Money {
  currency
  amount
}

fragment TaxedMoney on TaxedMoney {
  net {
    ...Money
  }
  gross {
    ...Money
  }
  tax {
    ...Money
  }
}


# --------------------------------------
fragment OrderLineFragment on OrderLine {
  id
  quantity
  variant {
    id  # ← ADDED: Critical for linking to Promco DB
    sku  # ← ADDED: For product lookup
    name
    attributes(variantSelection: ALL) {
      values {
        name
        dateTime
        boolean
        translation(languageCode: $languageCode) {
          name
        }
      }
    }
  }
  totalPrice {
    gross {
      ...Money
    }
  }
  undiscountedTotalPrice {  # ← ADDED: For profit calculation
    gross {
      ...Money
    }
  }
  undiscountedUnitPrice {
    gross {
      ...Money
    }
  }
  unitPrice {
    gross {
      ...Money
    }
  }
  unitDiscount {  # ← ADDED: Per-unit discount amount
    amount
  }
  isGift  # ← ADDED: For gift promotions
  productName
  variantName
  thumbnail(size: 128, format: WEBP) {
    alt
    url
  }
}

fragment ShippingFragment on ShippingMethod {
  name
  minimumDeliveryDays
  maximumDeliveryDays
}

fragment OrderFragment on Order {
  id
  number
  status
  created
  userEmail
  isPaid
  discounts {
    type
    name
    amount {
      ...Money
    }
  }
  chargeStatus
  authorizeStatus
  shippingAddress {
    ...AddressFragment
  }
  billingAddress {
    ...AddressFragment
  }
  deliveryMethod {
    ...ShippingFragment
  }
  total {
    gross {
      ...Money
    }
    tax {
      ...Money
    }
  }
  undiscountedTotal {  # ← ADDED: For total discount calculation
    gross {
      ...Money
    }
  }
  voucher {
    code
  }
  shippingPrice {
    gross {
      ...Money
    }
  }
  subtotal {
    gross {
      ...Money
    }
  }
  lines {
    ...OrderLineFragment
  }
  totalBalance {
    ...Money
  }
  totalCaptured {
    ...Money
  }
  metadata {  # ← ADDED: To link to Promco campaigns
    key
    value
  }
}
# --------------------------------------
fragment OrderBasic on Order {
  id
  number
  created
  status
  total {
    gross {
      ...Money
    }
  }
}

# Detailed order information
