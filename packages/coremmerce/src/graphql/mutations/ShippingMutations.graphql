mutation ShippingPriceCreate($input: ShippingPriceInput!) {
  shippingPriceCreate(input: $input) {
    errors {
      field
      code
      message
    }
    shippingMethod {
      id
      name
      type
      minimumOrderWeight {
        value
        unit
      }
      maximumOrderWeight {
        value
        unit
      }
      channelListings {
        channel {
          id
          name
        }
        price {
          amount
          currency
        }
        minimumOrderPrice {
          amount
          currency
        }
        maximumOrderPrice {
          amount
          currency
        }
      }
    }
  }
}

mutation ShippingMethodChannelListingUpdate(
  $id: ID!
  $input: ShippingMethodChannelListingInput!
) {
  shippingMethodChannelListingUpdate(id: $id, input: $input) {
    errors {
      field
      message
      code
    }
    shippingMethod {
      id
      name
      channelListings {
        ...ShippingMethodChannelListingFields
      }
    }
  }
}
